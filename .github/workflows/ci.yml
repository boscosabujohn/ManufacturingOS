name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/*', 'claude/*']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b3-erp/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: test_db

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          directory: b3-erp/backend/coverage
          flags: backend
          fail_ci_if_error: false

  # Backend Build
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: b3-erp/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: b3-erp/backend/dist
          retention-days: 7

  # Frontend Lint
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b3-erp/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  # Frontend Type Check (non-blocking until backlog of ~250 errors is cleaned up — issue #125)
  frontend-typecheck:
    name: Frontend Type Check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: b3-erp/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        # Errors are reported but the job is `continue-on-error: true`. Track cleanup in #125.
        run: npm run type-check

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b3-erp/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          directory: b3-erp/frontend/coverage
          flags: frontend
          fail_ci_if_error: false


  # Frontend Build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]

    defaults:
      run:
        working-directory: b3-erp/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: b3-erp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: b3-erp/frontend/.next
          retention-days: 7

  # E2E Tests (only on main and develop)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download backend build
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: b3-erp/backend/dist

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: b3-erp/frontend/.next

      - name: Install backend dependencies
        run: npm ci
        working-directory: b3-erp/backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: b3-erp/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: b3-erp/frontend

      - name: Start backend server
        run: npm run start:prod &
        working-directory: b3-erp/backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: test_db
          JWT_SECRET: test-secret-key
          PORT: 3001

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/health -t 60000

      - name: Start frontend server
        run: npm run start &
        working-directory: b3-erp/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
        working-directory: b3-erp/frontend
        env:
          BASE_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: b3-erp/frontend/playwright-report
          retention-days: 7

  # Security Audit (informational — cleanup tracked in #125)
  security-audit:
    name: Security Audit (informational)
    runs-on: ubuntu-latest
    # Both backend and frontend dep trees carry vulnerabilities that require
    # breaking version bumps to resolve (jspdf in frontend, validator/multer/
    # nodemailer/lodash etc. in backend). The audit is run for visibility but
    # does NOT gate merges until those breaking bumps land. Issue #125 tracks
    # the cleanup; once done, drop continue-on-error and re-tighten thresholds.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend npm audit
        run: npm audit --audit-level=critical
        working-directory: b3-erp/backend

      - name: Frontend npm audit
        run: npm audit --audit-level=critical
        working-directory: b3-erp/frontend

  # Docker Build Verification and Scan
  docker-build-scan:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-node@v4 # Using setup-node to get npm for versioning if needed

      - name: Build Backend Image
        run: |
          docker build -t manufacturing-erp-backend:latest -f b3-erp/docker/backend/Dockerfile b3-erp/backend

      - name: Build Frontend Image
        run: |
          docker build -t manufacturing-erp-frontend:latest -f b3-erp/docker/frontend/Dockerfile b3-erp/frontend

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'manufacturing-erp-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'manufacturing-erp-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'


  # Summary Job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-test, backend-build, frontend-lint, frontend-test, frontend-build, security-audit, docker-build-scan]

    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Backend Tests: ${{ needs.backend-test.result }}"
          echo "Backend Build: ${{ needs.backend-build.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Docker Build & Scan: ${{ needs.docker-build-scan.result }}"

      - name: Fail if any job failed
        if: |
          needs.backend-test.result == 'failure' ||
          needs.backend-build.result == 'failure' ||
          needs.frontend-lint.result == 'failure' ||
          needs.frontend-build.result == 'failure' ||
          needs.docker-build-scan.result == 'failure'
        run: exit 1
